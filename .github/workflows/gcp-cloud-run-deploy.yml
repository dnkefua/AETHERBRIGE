name: Deploy to Google Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: aetherbridge-a0e97
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set gcloud project
        run: |
          gcloud config set project ${{ env.PROJECT_ID }}
          gcloud config set run/region ${{ env.REGION }}

      - name: Build and push backend image
        run: |
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/aetherbridge-backend:$GITHUB_SHA backend

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy aetherbridge-backend \
            --image gcr.io/${{ env.PROJECT_ID }}/aetherbridge-backend:$GITHUB_SHA \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated \
            --set-env-vars REDIS_URL=${{ secrets.REDIS_URL }},MORALIS_API_KEY=${{ secrets.MORALIS_API_KEY }}

      - name: Build and push frontend image
        run: |
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/aetherbridge-frontend:$GITHUB_SHA .

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy aetherbridge-frontend \
            --image gcr.io/${{ env.PROJECT_ID }}/aetherbridge-frontend:$GITHUB_SHA \
            --region ${{ env.REGION }} --platform managed --allow-unauthenticated \
            --set-env-vars NEXT_PUBLIC_BACKEND_URL=$(gcloud run services describe aetherbridge-backend --region ${{ env.REGION }} --platform managed --format='value(status.url)')

      - name: Output deployed URLs
        run: |
          echo "Backend URL: $(gcloud run services describe aetherbridge-backend --region ${{ env.REGION }} --platform managed --format='value(status.url)')"
          echo "Frontend URL: $(gcloud run services describe aetherbridge-frontend --region ${{ env.REGION }} --platform managed --format='value(status.url)')"
